  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Montserrat:wght@400;700&family=Poppins&display=swap" rel="stylesheet"/>

  <!-- Vendor CSS -->

  <link href="assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet" />

  <!-- Main CSS -->

  <style>
    .custom-logo-wrap {
      gap: 10px;
      text-decoration: none;
    }

    .header-logo-img {
      width: 42px;
      height: 42px;
    }

    .gallery-section {
      padding: 120px 0 60px;
    }

    .gallery-item {
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
    }

    .gallery-item img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.05);
    }

    /* Section Headings */
    .gallery-section h2 {
      font-family: "Montserrat", sans-serif;
      font-weight: 700;
      letter-spacing: 1px;
      text-align: center;
      margin-bottom: 25px;
      position: relative;
    }

    .gallery-section h2::after {
      content: "";
      display: block;
      width: 60px;
      height: 3px;
      background: #000;
      margin: 10px auto 0;
      border-radius: 2px;
    }

    @media (max-width: 768px) {
      .gallery-item img {
        height: 200px;
      }
    }
  </style>
</head>
